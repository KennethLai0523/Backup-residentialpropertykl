<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { canonicalFromLocation, applySocialMeta, SITE_NAME, DEFAULT_OG_IMAGE } from "/seo-meta.js?v=1";

  const firebaseConfig = {
    apiKey: "AIzaSyBKO4RNc5r8GoPHQyRHdUllLVwtXFNJyVo",
    authDomain: "residentialpropertykl.firebaseapp.com",
    projectId: "residentialpropertykl",
    storageBucket: "residentialpropertykl.firebasestorage.app",
    messagingSenderId: "952845303526",
    appId: "1:952845303526:web:7b604dca11ad50a93bc527",
    measurementId: "G-DV21X2EGJ0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const listingList = document.getElementById("listingList");
  const emptyState = document.getElementById("emptyState");
  const resultsText = document.getElementById("resultsText");
  const listingTypeFilter = document.getElementById("listingTypeFilter");

  const pageTitle = document.getElementById("pageTitle");
  const crumbLabel = document.getElementById("crumbLabel");
  const seoText = document.getElementById("seoText");
  const canonicalLink = document.getElementById("canonicalLink");
  const metaDesc = document.querySelector('meta[name="description"]');

  let allItems = [];
  let baseFilteredItems = [];
  let klAreaLeafletMap = null;

  const KL_MAP_QUERY_NAMES = [
    "Kepong",
    "Batu",
    "Wangsa Maju",
    "Setiawangsa",
    "Segambut",
    "Titiwangsa",
    "Bukit Bintang",
    "Lembah Pantai",
    "Cheras",
    "Seputeh",
    "Bandar Tun Razak"
  ];

  function getCategoryPathKey() {
    let path = window.location.pathname.replace(/^\/|\/$/g, "");
    if (path.startsWith("categories/")) {
      path = path.replace("categories/", "");
    }
    return path || "";
  }

  function isCategoryListingsTemplatePath() {
    const path = getCategoryPathKey();
    if (path === "listings.html" || path.endsWith("listings.html")) return true;
    const simpleTypes = [
      "all-listings",
      "condominium",
      "apartment",
      "terrace-house",
      "semi-detached-house",
      "bungalow",
      "townhouse",
      "soho"
    ];
    if (simpleTypes.includes(path)) return true;
    if (path.includes("-for-sale-") || path.includes("-for-rent-")) return true;
    return false;
  }

  /** Resolve KL constituency from query (?location=, ?area=, or ?city=) — matches site links that use `area`. */
  function getKlAreaForMapFromURL() {
    const params = new URLSearchParams(window.location.search);
    const candidates = [
      params.get("location"),
      params.get("area"),
      params.get("city")
    ].filter(Boolean);

    for (let i = 0; i < candidates.length; i++) {
      let decoded = String(candidates[i]).trim();
      try {
        decoded = decodeURIComponent(decoded);
      } catch {
        /* keep raw */
      }
      decoded = decoded.trim();
      if (!decoded) continue;
      const match =
        KL_MAP_QUERY_NAMES.find((n) => n.toLowerCase() === decoded.toLowerCase()) || null;
      if (match) return match;
    }
    return null;
  }

  function escapeHtmlListingsMap(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function orderedKlFeaturesFromGeojson(geojson) {
    const allowed = new Set(KL_MAP_QUERY_NAMES);
    const features = (geojson.features || []).filter((f) => allowed.has(f.properties?.name));
    features.sort(
      (a, b) =>
        KL_MAP_QUERY_NAMES.indexOf(a.properties.name) - KL_MAP_QUERY_NAMES.indexOf(b.properties.name)
    );
    return features;
  }

  /**
   * @param {object[]} listingsForPins
   * @param {{ focusArea: string | null }} options — focusArea null = show all 11 polygons
   */
  async function initKlExploreMap(listingsForPins, options) {
    const focusArea = options && options.focusArea ? options.focusArea : null;
    const section = document.getElementById("klAreaMapSection");
    const container = document.getElementById("klAreaExploreMap");
    const Leaflet = typeof window !== "undefined" ? window.L : undefined;
    if (!section || !container || !Leaflet) {
      return;
    }

    if (klAreaLeafletMap) {
      klAreaLeafletMap.remove();
      klAreaLeafletMap = null;
    }
    while (container.firstChild) container.removeChild(container.firstChild);

    let geojson;
    try {
      geojson = await fetch("/map/kl-parlimen.geojson").then((r) => r.json());
    } catch (err) {
      console.error("KL map: failed to load GeoJSON", err);
      section.classList.add("hidden");
      return;
    }

    let features = orderedKlFeaturesFromGeojson(geojson);
    if (focusArea) {
      features = features.filter((f) => f.properties.name === focusArea);
    }
    if (!features.length) {
      section.classList.add("hidden");
      return;
    }

    const map = Leaflet.map(container).setView([3.139, 101.6869], 11);
    klAreaLeafletMap = map;

    Leaflet.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    const polyLayer = Leaflet.geoJSON(
      { type: "FeatureCollection", features },
      {
        style(feature) {
          if (focusArea) {
            return {
              color: "#ff00cc",
              weight: 4,
              fillColor: "#ff00cc",
              fillOpacity: 0.35
            };
          }
          return {
            color: "#ff00cc",
            weight: 3,
            fillColor: "#ff00cc",
            fillOpacity: 0.3
          };
        },
        onEachFeature(feature, layer) {
          if (focusArea) return;
          const name = feature.properties.name;
          const nameEsc = escapeHtmlListingsMap(name);
          const href = `/categories/all-listings?area=${encodeURIComponent(name)}`;
          layer.bindPopup(
            `<div style="font-size:13px;line-height:1.4"><strong>${nameEsc}</strong><br><a href="${href}" style="color:var(--green,#1B4332);font-weight:700">View listings</a></div>`
          );
        }
      }
    ).addTo(map);

    const listingMapCard = document.getElementById("klListingMapInfoCard");

    listingsForPins.forEach((item) => {
      const lat = Number(item.latitude);
      const lng = Number(item.longitude);
      if (
        !Number.isFinite(lat) ||
        !Number.isFinite(lng) ||
        lat <= 2 ||
        lat >= 4 ||
        lng <= 100 ||
        lng >= 102
      ) {
        return;
      }
      const marker = Leaflet.marker([lat, lng]).addTo(map);

      marker.on("click", () => {
        map.setView([lat, lng], Math.max(map.getZoom(), 14));
        if (!listingMapCard) return;
        listingMapCard.classList.remove("hidden");
        const slug = item.slug || generateSlug(item.title);
        const detailUrl = `/listing/${slug}-${item.id}`;
        listingMapCard.innerHTML = `
      <div class="map-info-card-title">${escapeHtmlListingsMap(item.title || "")}</div>
      <div class="map-info-card-price">${escapeHtmlListingsMap(String(item.price || ""))}</div>
      <div class="map-info-card-location">${escapeHtmlListingsMap(item.location || "")}</div>
      <a href="${detailUrl}">View Details</a>
    `;
      });
    });

    polyLayer.bringToBack();

    const pb = polyLayer.getBounds();
    if (pb.isValid()) {
      map.fitBounds(pb, {
        padding: [28, 28],
        maxZoom: focusArea ? 14 : 12
      });
    }

    setTimeout(() => map.invalidateSize(), 80);
    setTimeout(() => map.invalidateSize(), 350);
  }

  function isAllListingsPath() {
    const path = getCategoryPathKey();
    return path === "all-listings" || path === "listings.html" || path.endsWith("listings.html");
  }

  function maybeShowKlAreaMap(listingsForPins) {
    const section = document.getElementById("klAreaMapSection");
    const titleEl = document.getElementById("klAreaMapTitle");
    if (!section || !titleEl) return;

    if (!isCategoryListingsTemplatePath()) {
      section.classList.add("hidden");
      return;
    }

    const klName = getKlAreaForMapFromURL();

    if (klName) {
      section.classList.remove("hidden");
      titleEl.textContent = `Explore ${klName} on Map`;
      void initKlExploreMap(listingsForPins, { focusArea: klName });
      return;
    }

    if (!isAllListingsPath()) {
      section.classList.add("hidden");
      return;
    }

    section.classList.remove("hidden");
    titleEl.textContent = "Explore Kuala Lumpur areas on Map";

    void initKlExploreMap(listingsForPins, { focusArea: null });
  }

  function slugToType(slug) {
    const map = {
      "condominium": "Condominium",
      "apartment": "Apartment",
      "terrace-house": "Terrace House",
      "semi-detached-house": "Semi-Detached House",
      "bungalow": "Bungalow",
      "townhouse": "Townhouse",
      "soho": "SOHO",
      "all-listings": "All Listings"
    };

    return map[slug] || "All Listings";
  }

  function getFiltersFromURL() {
    let path = window.location.pathname.replace(/^\/|\/$/g, "");

    if (path.startsWith("categories/")) {
      path = path.replace("categories/", "");
    }

    if (!path || path === "listings.html") {
      return { type: null, listingType: null, location: null, area: null };
    }

    const params = new URLSearchParams(window.location.search);
    const area = params.get("area") || params.get("city") || params.get("location");

    const simpleTypes = [
      "all-listings",
      "condominium",
      "apartment",
      "terrace-house",
      "semi-detached-house",
      "bungalow",
      "townhouse",
      "soho"
    ];

    if (simpleTypes.includes(path)) {
      return {
        type: path === "all-listings" ? null : path,
        listingType: null,
        location: null,
        area
      };
    }

    const saleMarker = "-for-sale-";
    const rentMarker = "-for-rent-";

    if (path.includes(saleMarker)) {
      const [type, location] = path.split(saleMarker);
      return { type, listingType: "sale", location, area };
    }

    if (path.includes(rentMarker)) {
      const [type, location] = path.split(rentMarker);
      return { type, listingType: "rent", location, area };
    }

    return { type: null, listingType: null, location: null, area };
  }

  function normalizeType(value) {
    return (value || "")
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/(^-|-$)/g, "");
  }

  function normalizeText(value) {
    return (value || "").toLowerCase().trim();
  }

  /** Match URL segments like mont-kiara to city text like "Mont Kiara" */
  function locationMatchesFilter(item, locationSegment) {
    const needle = normalizeText(locationSegment).replace(/[\s-]+/g, "");
    if (!needle) return true;
    const hay = [item.city, item.location, item.area, item.address, item.state]
      .map((x) => normalizeText(x).replace(/[\s-]+/g, ""))
      .join(" ");
    return hay.includes(needle);
  }

  function formatPrice(price) {
    if (!price) return "Price on request";

    const num = Number(String(price).replace(/[^\d.]/g, ""));

    if (!Number.isNaN(num) && num > 0) {
      if (num >= 1000000) return `RM ${(num / 1000000).toFixed(num % 1000000 === 0 ? 0 : 1)}M`;
      if (num >= 1000) return `RM ${num.toLocaleString()}`;
      return `RM ${num.toLocaleString()}`;
    }

    return String(price);
  }

  function formatPostedDate(timestamp) {
    if (!timestamp) return "Recently";

    let raw = 0;

    if (typeof timestamp?.toDate === "function") {
      raw = timestamp.toDate().getTime();
    } else if (timestamp?.seconds) {
      raw = timestamp.seconds * 1000;
    } else {
      raw = Number(timestamp);
    }

    if (!raw) return "Recently";

    const diffDays = Math.floor((Date.now() - raw) / (1000 * 60 * 60 * 24));

    if (diffDays <= 0) return "Today";
    if (diffDays === 1) return "1 day ago";
    if (diffDays < 30) return `${diffDays} days ago`;

    return new Date(raw).toLocaleDateString("en-MY");
  }

  function getSortTime(value) {
    if (!value) return 0;
    if (typeof value?.toDate === "function") return value.toDate().getTime();
    if (value?.seconds) return value.seconds * 1000;
    if (typeof value === "number") return value;
    const parsed = new Date(value).getTime();
    return Number.isNaN(parsed) ? 0 : parsed;
  }

  function generateSlug(title) {
    return (title || "listing")
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/(^-|-$)/g, "");
  }

  function renderListings(items) {
    listingList.innerHTML = "";

    if (!items.length) {
      emptyState.style.display = "block";
      resultsText.textContent = "Showing 0 listings";
      return;
    }

    emptyState.style.display = "none";
    resultsText.textContent = `Showing ${items.length} listing${items.length > 1 ? "s" : ""}`;

    items.forEach((item, index) => {
      const card = document.createElement("article");
      card.className = "listing-card";
      card.style.animationDelay = `${Math.min(index * 0.06, 0.42)}s`;

const slug = item.slug || generateSlug(item.title);
const detailUrl = `/listing/${slug}-${item.id}`;
      card.dataset.link = detailUrl;

      const label1 = item.listingType === "rent" ? "FOR RENT" : "FOR SALE";
      const hotLabel = item.hotOffer ? `<span class="label hot">HOT OFFER</span>` : "";

card.innerHTML = `
<div class="listing-thumb"
  style="background-image:url('${item.image || "/images/hero-residential-green.webp"}')">

  ${item.watermarkType === "watermark2"
    ? `
      <div class="listing-square-watermark-card">
        <span>RESIDENTIAL<br>PROPERTY KL</span>
      </div>
    `
    : `
      <div class="watermark-box">
        <span class="watermark-text">RESIDENTIAL PROPERTY KL</span>
      </div>
    `
  }

  <div class="listing-labels">
    <span class="label">${label1}</span>
    ${hotLabel}
  </div>
</div>

  <div class="listing-body">

<div class="price-row">

  <div class="listing-price">
    ${formatPrice(item.price)}
  </div>

  <a class="btn-gold mobile-detail-btn" href="${detailUrl}">
    Details
  </a>

</div>

    <h2 class="listing-title">${item.title || "-"}</h2>

    <div class="listing-meta">
      ${item.location || "-"}${item.city ? `, ${item.city}` : ""}
    </div>

    <div class="listing-info">
      <strong>Built-up:</strong> ${item.bua || "-"}
    </div>

    <div class="listing-type">${item.type || "-"}</div>

    <div class="listing-agent">
      Residential Property KL Group •
      ${formatPostedDate(item.postedAt || item.createdAt)}
    </div>

    <div class="listing-bottom">
      <a class="btn-wa"
        href="https://wa.me/${item.agentPhone ? String(item.agentPhone).replace(/\D/g, "") : "60166287357"}?text=${encodeURIComponent(`Hi, I am interested in ${item.title || "this listing"}.`)}"
        target="_blank"
        rel="noopener noreferrer">
        WhatsApp
      </a>
    </div>

  </div>
`;

      listingList.appendChild(card);

      card.addEventListener("click", function (e) {
        if (e.target.closest("a, button")) return;
        window.location.href = card.dataset.link;
      });
    });
  }

  function updatePageText(type, listingType, location, area) {
    const syncUrlMeta = (pageTitleStr, description) => {
      const canonical = canonicalFromLocation();
      canonicalLink.href = canonical;
      applySocialMeta({
        title: `${pageTitleStr} | ${SITE_NAME}`,
        description,
        url: canonical,
        image: DEFAULT_OG_IMAGE,
        type: "website"
      });
    };

    if (type && listingType && location) {
      const niceType = slugToType(type);
      const niceIntent = listingType === "rent" ? "Rent" : "Sale";
      const niceLocation = location
        .split("-")
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(" ");

      const titleText = `${niceType} for ${niceIntent} in ${niceLocation}`;

      pageTitle.textContent = titleText;
      crumbLabel.textContent = titleText;
      document.title = `${titleText} | Residential Property KL`;
      seoText.textContent = `Explore ${niceType.toLowerCase()} for ${niceIntent.toLowerCase()} in ${niceLocation}. Browse the latest residential property listings in ${niceLocation}.`;

      if (metaDesc) {
        metaDesc.setAttribute("content", `Browse ${niceType.toLowerCase()} for ${niceIntent.toLowerCase()} in ${niceLocation}, Klang Valley. View the latest residential property listings in ${niceLocation}.`);
      }

      syncUrlMeta(titleText, metaDesc ? metaDesc.getAttribute("content") : seoText.textContent);
      return;
    }

    if (area) {
      const titleText = `Properties in ${area}`;
      pageTitle.textContent = titleText;
      crumbLabel.textContent = titleText;
      document.title = `${titleText} | Residential Property KL`;
      seoText.textContent = `Browse residential property listings in ${area}, including condominiums, apartments, landed homes and new project options across Kuala Lumpur and Selangor.`;
      if (metaDesc) {
        metaDesc.setAttribute("content", `Find condos, apartments, terrace houses, semi-D and bungalows in ${area}. Klang Valley residential listings from Residential Property KL.`);
      }
      syncUrlMeta(titleText, metaDesc ? metaDesc.getAttribute("content") : seoText.textContent);
      return;
    }

    if (type) {
      const niceType = slugToType(type);
      pageTitle.textContent = niceType;
      crumbLabel.textContent = niceType;
      document.title = `${niceType} | Residential Property KL`;
      seoText.textContent = `Browse ${niceType.toLowerCase()} listings in Kuala Lumpur, Petaling Jaya and Selangor (Klang Valley).`;
      if (metaDesc) {
        metaDesc.setAttribute("content", `View ${niceType.toLowerCase()} for sale and for rent across KL, PJ and Selangor. Updated residential listings.`);
      }
      syncUrlMeta(niceType, metaDesc ? metaDesc.getAttribute("content") : seoText.textContent);
      return;
    }

    pageTitle.textContent = "All Listings";
    crumbLabel.textContent = "All Listings";
    document.title = "All Listings | Residential Property KL";
    seoText.textContent = "Browse residential property listings including condominiums, apartments, terrace houses, bungalows and more in Kuala Lumpur and Selangor.";
    if (metaDesc) {
      metaDesc.setAttribute("content", seoText.textContent);
    }
    syncUrlMeta("All Listings", seoText.textContent);
  }

  function applyToggleFilter(selected) {
    let filtered = [...baseFilteredItems];

    if (selected) {
      filtered = filtered.filter(item =>
        normalizeText(item.listingType) === selected
      );
    }

    renderListings(filtered);
  }

  async function loadListings() {
    const { type, listingType, location, area } = getFiltersFromURL();

    updatePageText(type, listingType, location, area);

    try {
      const snapshot = await getDocs(collection(db, "listings"));
      const items = [];

      snapshot.forEach((docSnap) => {
        const data = docSnap.data();

        items.push({
          id: docSnap.id,
          ...data
        });
      });

      let filtered = [...items];

      if (type) {
        filtered = filtered.filter(item =>
          normalizeType(item.type) === type
        );
      }

      if (listingType) {
        filtered = filtered.filter(item =>
          normalizeText(item.listingType) === listingType
        );
      }

      if (location) {
        filtered = filtered.filter((item) => locationMatchesFilter(item, location));
      }

      if (area) {
        filtered = filtered.filter(item => {
          const haystack = [
            item.area,
            item.city,
            item.location,
            item.address,
            item.state
          ].join(" ").toLowerCase();

          return haystack.includes(area.toLowerCase());
        });
      }

      filtered.sort((a, b) => getSortTime(b.createdAt || b.postedAt) - getSortTime(a.createdAt || a.postedAt));

      allItems = items;
      baseFilteredItems = filtered;

      renderListings(baseFilteredItems);
      maybeShowKlAreaMap(items);

      const toggleButtons = document.querySelectorAll("#listingTypeFilter button");

      toggleButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          toggleButtons.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          applyToggleFilter(btn.dataset.value);
        });
      });

    } catch (error) {
      console.error(error);
      resultsText.textContent = "Failed to load listings";
      emptyState.style.display = "block";
      emptyState.textContent = "Unable to load listings.";
      document.getElementById("klAreaMapSection")?.classList.add("hidden");
    }
  }

  loadListings();
</script>

<div id="floating-nav-placeholder"></div>

<script>
  fetch("/floating-nav.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("floating-nav-placeholder").innerHTML = html;

      const btn = document.getElementById("navFloatBtn");
      const menu = document.getElementById("floatNavMenu");
      const waMenu = document.getElementById("waSlideMenu");

      if (btn && menu && waMenu) {
        btn.addEventListener("click", () => {
          menu.classList.toggle("hidden");
          waMenu.classList.toggle("show");
        });
      }
    });
</script>
