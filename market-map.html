<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow" />
  <meta name="description" content="Interactive Klang Valley residential market map with PSF heat zones and live listing pins across Kuala Lumpur constituencies." />
  <link rel="canonical" href="https://residentialpropertykl.com/market-map.html" />
  <title>KL Residential Market Map | Residential Property KL</title>
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Residential Property KL" />
  <meta property="og:locale" content="en_MY" />
  <meta property="og:url" content="https://residentialpropertykl.com/market-map.html" />
  <meta property="og:title" content="KL Residential Market Map | Residential Property KL" />
  <meta property="og:description" content="Explore PSF zones and live residential listings on an interactive Kuala Lumpur market map." />
  <meta property="og:image" content="https://residentialpropertykl.com/images/logo.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="KL Residential Market Map | Residential Property KL" />
  <meta name="twitter:description" content="Explore PSF zones and live residential listings on an interactive Kuala Lumpur market map." />
  <meta name="twitter:image" content="https://residentialpropertykl.com/images/logo.png" />
  <link rel="preconnect" href="https://unpkg.com" crossorigin />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      color: #111;
    }

    .market-header {
      padding: 18px 22px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
    }

    .market-header h1 {
      margin: 0;
      font-size: 22px;
    }

    .market-header p {
      margin: 5px 0 0;
      font-size: 14px;
      color: #666;
    }

    .market-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh - 82px);
    }

    .sidebar {
      background: #fff;
      border-right: 1px solid #e5e7eb;
      padding: 18px;
      overflow-y: auto;
    }

    .summary-card {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .summary-card h3 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 8px 0;
      font-size: 14px;
    }

    .stat strong {
      text-align: right;
    }

    .filter-group {
      margin-bottom: 14px;
    }

    .filter-group label {
      display: block;
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .filter-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #fff;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .zone-popup-title {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .zone-popup-row {
      font-size: 13px;
      margin: 4px 0;
    }

    .zone-popup-price {
      font-size: 14px;
      font-weight: 800;
      color: #0f766e;
      margin: 6px 0;
    }

    .zone-popup-link {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #0f766e;
      color: #fff !important;
      font-size: 13px;
      font-weight: 700;
      border-radius: 8px;
      text-decoration: none;
    }

    .zone-popup-link:hover {
      opacity: 0.92;
    }

    .market-legend {
      background: #fff;
      padding: 10px 12px;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
      font-size: 12px;
      line-height: 1.45;
      min-width: 168px;
    }

    .market-legend strong {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .market-legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
    }

    .market-legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(0, 0, 0, 0.12);
    }

    @media (max-width: 820px) {
      .market-layout {
        grid-template-columns: 1fr;
        height: auto;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid #e5e7eb;
      }

      #map {
        height: 72vh;
      }
    }
  </style>
</head>

<body>
  <header class="market-header">
    <h1>Residential Property KL Market Map</h1>
    <p>Average asking price by zone, calculated from your current listings.</p>
  </header>

  <main class="market-layout">
    <aside class="sidebar">
      <div class="summary-card">
        <h3>Market Summary</h3>

        <div class="stat">
          <span>Total Zones</span>
          <strong id="totalZones">0</strong>
        </div>

        <div class="stat">
          <span>Total Listings Used</span>
          <strong id="totalListings">0</strong>
        </div>

        <div class="stat">
          <span>Average Price</span>
          <strong id="avgPrice">RM 0</strong>
        </div>

        <div class="stat">
          <span>Average PSF</span>
          <strong id="avgPsf">RM 0 psf</strong>
        </div>
      </div>

      <div class="filter-group">
        <label>Property Type</label>
        <select id="typeFilter">
          <option value="all">All Types</option>
          <option value="Condo">Condo</option>
          <option value="Apartment">Apartment</option>
          <option value="Terrace House">Terrace House</option>
          <option value="Semi-D">Semi-D</option>
          <option value="Bungalow">Bungalow</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Listing Type</label>
        <select id="listingTypeFilter">
          <option value="sale">Sale Only</option>
          <option value="rent">Rent Only</option>
          <option value="all">All</option>
        </select>
      </div>
    </aside>

    <section id="map"></section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBKO4RNc5r8GoPHQyRHdUllLVwtXFNJyVo",
  authDomain: "residentialpropertykl.firebaseapp.com",
  projectId: "residentialpropertykl",
  storageBucket: "residentialpropertykl.firebasestorage.app",
  messagingSenderId: "952845303526",
  appId: "1:952845303526:web:7b604dca11ad50a93bc527",
  measurementId: "G-DV21X2EGJ0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

    const map = L.map("map").setView([3.0738, 101.5183], 11);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const LegendControl = L.Control.extend({
      options: { position: "bottomright" },
      onAdd() {
        const div = L.DomUtil.create("div", "market-legend");
        div.innerHTML = `
          <strong>Avg PSF (legend)</strong>
          <div class="market-legend-row"><span class="market-legend-swatch" style="background:#2563eb"></span> Below RM400 psf</div>
          <div class="market-legend-row"><span class="market-legend-swatch" style="background:#22c55e"></span> RM400–600 psf</div>
          <div class="market-legend-row"><span class="market-legend-swatch" style="background:#eab308"></span> RM600–800 psf</div>
          <div class="market-legend-row"><span class="market-legend-swatch" style="background:#f97316"></span> RM800–1000 psf</div>
          <div class="market-legend-row"><span class="market-legend-swatch" style="background:#dc2626"></span> Above RM1000 psf</div>
        `;
        L.DomEvent.disableClickPropagation(div);
        return div;
      }
    });
    new LegendControl().addTo(map);

    let allListings = [];
    let zoneLayers = [];
    let zonePolygonsLayer = null;
    let currentZoneStats = {};

    function cleanNumber(value) {
      if (!value) return 0;
      return Number(String(value).replace(/[^\d.]/g, "")) || 0;
    }

    const MIN_PRICE = 50000;
    const MAX_PRICE = 50000000;
    const MIN_BUILT_UP = 200;
    const MAX_BUILT_UP = 50000;
    const MIN_PSF = 50;
    const MAX_PSF = 5000;

    /**
     * PSF band colors (RM per sq ft) — polygons, bubbles, legend.
     */
    function getPsfColor(psf) {
      if (psf >= 1000) return "#dc2626";
      if (psf >= 800) return "#f97316";
      if (psf >= 600) return "#eab308";
      if (psf >= 400) return "#22c55e";
      return "#2563eb";
    }

    function isValidResidentialListing(price, builtUp, lat, lng) {
      if (!lat || !lng || !Number.isFinite(lat) || !Number.isFinite(lng)) return false;
      if (price < MIN_PRICE || price > MAX_PRICE) return false;
      if (builtUp < MIN_BUILT_UP || builtUp > MAX_BUILT_UP) return false;
      const psf = price / builtUp;
      if (!Number.isFinite(psf) || psf < MIN_PSF || psf > MAX_PSF) return false;
      return true;
    }

    /** Bubble radius from listing count (min 10, max 42). */
    function getZoneRadius(count) {
      const c = Math.max(1, count);
      const linear = 10 + (c - 1) * (32 / 30);
      return Math.min(42, Math.max(10, Math.round(linear)));
    }

    function formatRM(value) {
      return "RM " + Math.round(value).toLocaleString("en-MY");
    }

    function getListingPrice(listing) {
      return cleanNumber(listing.price);
    }

    function getBuiltUp(listing) {
      return cleanNumber(listing.bua || listing.builtUp || listing.size);
    }

    function getLat(listing) {
      return Number(listing.latitude || listing.lat || 0);
    }

    function getLng(listing) {
      return Number(listing.longitude || listing.lng || 0);
    }

    function normalizeZoneName(listing) {
      const text = [
        listing.title,
        listing.location,
        listing.address,
        listing.city,
        listing.area
      ].filter(Boolean).join(" ").toLowerCase();

      if (text.includes("mont kiara") || text.includes("montkiara") || text.includes("solaris")) {
        return "Mont Kiara";
      }

      return (
        listing.location ||
        listing.city ||
        listing.area ||
        "Unknown Area"
      ).trim();
    }

    function getZoneName(listing) {
      return normalizeZoneName(listing);
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    async function loadZonePolygons(zoneStats) {
      try {
        const geojson = await fetch("/map/kl-parlimen.geojson").then((res) => res.json());

        if (zonePolygonsLayer) {
          map.removeLayer(zonePolygonsLayer);
          zonePolygonsLayer = null;
        }

        zonePolygonsLayer = L.geoJSON(geojson, {
          style(feature) {
            const zoneName = feature.properties.name;
            const stats = zoneStats[zoneName];

            return {
              color: "#ff00cc",
              weight: 3,
              fillColor: stats ? getPsfColor(stats.avgPsf) : "#ffcc00",
              fillOpacity: stats ? 0.45 : 0.4
            };
          },

          onEachFeature(feature, layer) {
            const zoneName = feature.properties.name;
            const stats = zoneStats[zoneName];
            const nameEsc = escapeHtml(zoneName);

            if (!stats) {
              layer.bindPopup(
                `<div><strong>${nameEsc}</strong><br>No listing data yet</div>`
              );
              return;
            }

            const listingsHref = `/categories/all-listings?location=${encodeURIComponent(zoneName)}`;

            layer.bindPopup(`
          <div>
            <div class="zone-popup-title">${nameEsc}</div>
            <div class="zone-popup-price">${formatRM(stats.avgPrice)}</div>
            <div class="zone-popup-row"><strong>Average PSF:</strong> RM ${Math.round(stats.avgPsf).toLocaleString("en-MY")} psf</div>
            <div class="zone-popup-row"><strong>Listings used:</strong> ${stats.count}</div>
            <div class="zone-popup-row"><strong>Data type:</strong> Asking price</div>
            <a class="zone-popup-link" href="${listingsHref}">View listings in this zone</a>
          </div>
        `);
          }
        }).addTo(map);

        zonePolygonsLayer.bringToFront();

        const zoneBounds = zonePolygonsLayer.getBounds();
        if (zoneBounds.isValid()) {
          map.fitBounds(zoneBounds, { padding: [36, 36], maxZoom: 12 });
        }
      } catch (error) {
        console.error("Failed to load /map/kl-parlimen.geojson:", error);
      }
    }

    async function loadListings() {
const q = query(
  collection(db, "listings"),
  where("status", "==", "active")
);

const snapshot = await getDocs(q);

      allListings = snapshot.docs.map(doc => ({
        id: doc.id,
        ...doc.data()
      }));

      await renderZoneMap();
    }

    async function renderZoneMap() {
      zoneLayers.forEach((layer) => map.removeLayer(layer));
      zoneLayers = [];
      if (zonePolygonsLayer) {
        map.removeLayer(zonePolygonsLayer);
        zonePolygonsLayer = null;
      }

      const selectedType = document.getElementById("typeFilter").value;
      const selectedListingType = document.getElementById("listingTypeFilter").value;

      const usableListings = allListings
        .filter(item => {
          const price = getListingPrice(item);
          const builtUp = getBuiltUp(item);
          const lat = getLat(item);
          const lng = getLng(item);

          if (!isValidResidentialListing(price, builtUp, lat, lng)) return false;

          const matchType =
            selectedType === "all" ||
            String(item.type || "").toLowerCase() === selectedType.toLowerCase();

          const matchListingType =
            selectedListingType === "all" ||
            String(item.listingType || "").toLowerCase() === selectedListingType.toLowerCase();

          return matchType && matchListingType;
        })
        .map(item => {
          const price = getListingPrice(item);
          const builtUp = getBuiltUp(item);
          const psf = price / builtUp;

          return {
            ...item,
            zoneName: getZoneName(item),
            price,
            builtUp,
            psf,
            lat: getLat(item),
            lng: getLng(item)
          };
        });

      const zones = {};

      usableListings.forEach(item => {
        const key = item.zoneName;

        if (!zones[key]) {
          zones[key] = {
            zoneName: key,
            totalPrice: 0,
            totalPsf: 0,
            totalLat: 0,
            totalLng: 0,
            count: 0
          };
        }

        zones[key].totalPrice += item.price;
        zones[key].totalPsf += item.psf;
        zones[key].totalLat += item.lat;
        zones[key].totalLng += item.lng;
        zones[key].count += 1;
      });

      const zoneArray = Object.values(zones).map(zone => ({
        zoneName: zone.zoneName,
        avgPrice: zone.totalPrice / zone.count,
        avgPsf: zone.totalPsf / zone.count,
        lat: zone.totalLat / zone.count,
        lng: zone.totalLng / zone.count,
        count: zone.count
      }));

      currentZoneStats = {};
      zoneArray.forEach((zone) => {
        currentZoneStats[zone.zoneName] = zone;
      });

      await loadZonePolygons(currentZoneStats);

      zoneArray.forEach(zone => {
        const radius = getZoneRadius(zone.count);
        const fill = getPsfColor(zone.avgPsf);

        const circle = L.circleMarker([zone.lat, zone.lng], {
          radius,
          fillOpacity: 0.55,
          weight: 1,
          color: fill,
          fillColor: fill
        }).addTo(map);

        const locParam = encodeURIComponent(zone.zoneName);
        const listingsHref = `/categories/all-listings?location=${locParam}`;

        circle.bindPopup(`
          <div>
            <div class="zone-popup-title">${escapeHtml(zone.zoneName)}</div>
            <div class="zone-popup-price">${formatRM(zone.avgPrice)}</div>
            <div class="zone-popup-row"><strong>Average PSF:</strong> RM ${Math.round(zone.avgPsf).toLocaleString("en-MY")} psf</div>
            <div class="zone-popup-row"><strong>Listings used:</strong> ${zone.count}</div>
            <div class="zone-popup-row"><strong>Data type:</strong> Asking price</div>
            <a class="zone-popup-link" href="${listingsHref}">View listings in this zone</a>
          </div>
        `);

        zoneLayers.push(circle);
      });

      updateSummary(zoneArray, usableListings);
    }

    function updateSummary(zones, listings) {
      const totalZones = zones.length;
      const totalListings = listings.length;

      const avgPrice = totalListings
        ? listings.reduce((sum, item) => sum + item.price, 0) / totalListings
        : 0;

      const avgPsf = totalListings
        ? listings.reduce((sum, item) => sum + item.psf, 0) / totalListings
        : 0;

      document.getElementById("totalZones").textContent = totalZones;
      document.getElementById("totalListings").textContent = totalListings;
      document.getElementById("avgPrice").textContent = formatRM(avgPrice);
      document.getElementById("avgPsf").textContent =
        "RM " + Math.round(avgPsf).toLocaleString("en-MY") + " psf";
    }

    document.getElementById("typeFilter").addEventListener("change", () => {
      void renderZoneMap();
    });
    document.getElementById("listingTypeFilter").addEventListener("change", () => {
      void renderZoneMap();
    });

    loadListings();
  </script>
</body>
</html>
