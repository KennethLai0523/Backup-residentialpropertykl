<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/favicon.ico?v=2">

  <meta name="description" id="meta-desc" content="Residential property listing in Kuala Lumpur and Selangor.">

  <meta charset="UTF-8" />

  <meta name="theme-color" content="#1B4332" />
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />

  <link rel="stylesheet" href="/shared-layout.css?v=80" />

  <style>
    :root {
      --bg: #F7F5F0;
      --dark: #111;
      --muted: #666;
      --green: #1B4332;
      --green2: #2D6A4F;
      --gold: #EADFCB;
      --line: rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--dark);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .container {
      width: min(1240px, calc(100% - 40px));
      margin: 0 auto;
    }

    @keyframes heroZoom {
      from { transform: scale(1.03); }
      to { transform: scale(1.1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(35px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .topbar {
      animation: slideDown 0.55s ease both;
    }

    .loading,
    .error {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
      font-size: 18px;
    }

    .listing-hero {
      position: relative;
      min-height: 760px;
      display: flex;
      align-items: end;
      overflow: hidden;
      color: #fff;
      background: #0f1713;
    }

    .listing-hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      animation: heroZoom 18s ease-in-out infinite alternate;
    }

    .listing-hero-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          180deg,
          rgba(0,0,0,0.08) 0%,
          rgba(0,0,0,0.28) 42%,
          rgba(0,0,0,0.84) 100%
        );
    }

    .listing-hero::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 150px;
      background: linear-gradient(to top, var(--bg), transparent);
      z-index: 1;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 180px 0 120px;
    }

    .breadcrumb {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: rgba(255,255,255,0.72);
      font-size: 13px;
      margin-bottom: 24px;
      animation: fadeUp .8s ease .05s both;
    }

    .breadcrumb a {
      color: rgba(255,255,255,0.9);
      font-weight: 800;
    }

    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
      animation: fadeUp .8s ease .12s both;
    }

    .detail-badge {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 13px;
      border-radius: 999px;
      background: rgba(234,223,203,0.92);
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .8px;
      text-transform: uppercase;
    }

    .detail-badge.hot {
      background: #e53935;
      color: #fff;
    }

    .hero-title {
      margin: 0;
      max-width: 980px;
      font-size: clamp(46px, 7vw, 92px);
      line-height: .96;
      letter-spacing: -3px;
      animation: fadeUp .8s ease .22s both;
    }

    .hero-location {
      margin-top: 22px;
      color: rgba(255,255,255,.84);
      font-size: 18px;
      line-height: 1.8;
      animation: fadeUp .8s ease .34s both;
    }

    .hero-price-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 34px;
      animation: fadeUp .8s ease .46s both;
    }

    .hero-price {
      min-height: 60px;
      padding: 0 26px;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      color: var(--green);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 900;
      box-shadow: 0 18px 46px rgba(0,0,0,.18);
    }

    .hero-btn {
      min-height: 60px;
      padding: 0 24px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      transition: transform .22s ease, box-shadow .22s ease;
    }

    .hero-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(0,0,0,.18);
    }

    .hero-btn-wa {
      background: #25D366;
      color: #fff;
    }

    .hero-btn-dark {
      background: var(--green);
      color: #fff;
    }

    .detail-main {
      position: relative;
      z-index: 5;
      margin-top: -80px;
      padding-bottom: 110px;
    }

    .summary-card {
      background: rgba(255,255,255,.86);
      backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,.62);
      border-radius: 34px;
      box-shadow: 0 24px 80px rgba(0,0,0,.12);
      padding: 26px;
      margin-bottom: 32px;
      animation: cardReveal .75s ease .42s both;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
    }

    .summary-item {
      background: #fff;
      border: 1px solid rgba(0,0,0,.06);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 14px 36px rgba(0,0,0,.05);
    }

    .summary-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 8px;
    }

    .summary-value {
      color: var(--green);
      font-size: 20px;
      font-weight: 900;
      line-height: 1.35;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 28px;
      align-items: start;
    }

    .card {
      background: #fff;
      border-radius: 34px;
      border: 1px solid rgba(0,0,0,.06);
      box-shadow: 0 16px 46px rgba(0,0,0,.06);
      padding: 30px;
      margin-bottom: 28px;
      animation: cardReveal .7s ease both;
    }

    .section-kicker {
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .card h2 {
      margin: 0 0 22px;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1.05;
      letter-spacing: -1.6px;
    }

    .gallery-card {
      padding: 0;
      overflow: hidden;
    }

    .main-image-wrap {
      position: relative;
      overflow: hidden;
      background: #ddd;
    }

    .main-image {
      width: 100%;
      height: 620px;
      object-fit: cover;
      transition: transform .5s ease;
    }

    .main-image-wrap:hover .main-image {
      transform: scale(1.03);
    }

    .thumbs {
      display: flex;
      gap: 12px;
      padding: 18px;
      overflow-x: auto;
      background: #fff;
    }

    .thumbs img {
      width: 96px;
      height: 72px;
      object-fit: cover;
      border-radius: 14px;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: .74;
      transition: opacity .22s ease, border-color .22s ease, transform .22s ease;
    }

    .thumbs img:hover,
    .thumbs img.active {
      opacity: 1;
      border-color: var(--green);
      transform: translateY(-2px);
    }

    .desc {
      color: #333;
      line-height: 2;
      white-space: pre-line;
      font-size: 16px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .details-item {
      background: #F7F5F0;
      border: 1px solid rgba(0,0,0,.06);
      border-radius: 20px;
      padding: 18px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 8px;
    }

    .value {
      color: var(--dark);
      font-weight: 900;
      line-height: 1.45;
    }

    .map-frame {
      width: 100%;
      height: 380px;
      border: 0;
      border-radius: 26px;
      margin-top: 18px;
    }

    .map-link {
      margin-top: 18px;
      height: 50px;
      padding: 0 20px;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
    }

    .agent-card {
      position: sticky;
      top: 110px;
      background:
        linear-gradient(rgba(27,67,50,.94), rgba(27,67,50,.96)),
        url("/images/hero-residential-green.webp") center/cover no-repeat;
      color: #fff;
      border-radius: 34px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,.18);
      animation: cardReveal .7s ease .5s both;
    }

    .agent-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .agent-top img {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      object-fit: cover;
      background: #eee;
      border: 1px solid rgba(255,255,255,.2);
    }

    .agent-name {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.3;
    }

    .agent-sub {
      color: rgba(255,255,255,.72);
      font-size: 13px;
      margin-top: 4px;
    }

    .form-control {
      width: 100%;
      height: 50px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      padding: 0 15px;
      margin-bottom: 10px;
      font-size: 14px;
      font-family: inherit;
      background: rgba(255,255,255,.08);
      color: #fff;
      outline: none;
    }

    .form-control::placeholder {
      color: rgba(255,255,255,.62);
    }

    textarea.form-control {
      height: 120px;
      padding-top: 14px;
      resize: vertical;
    }

    .detail-btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      font-weight: 900;
      font-size: 14px;
      cursor: pointer;
      transition: transform .22s ease, box-shadow .22s ease;
    }

    .detail-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(0,0,0,.18);
    }

    .detail-btn-wa {
      background: #25D366;
      color: #fff;
    }

    .detail-btn-dark {
      background: #fff;
      color: var(--green);
    }

    .detail-btn-outline {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,.2);
    }

    .cta-card {
      background:
        linear-gradient(rgba(27,67,50,.92), rgba(27,67,50,.96)),
        url("/images/hero-residential-green.webp") center/cover no-repeat;
      color: #fff;
      text-align: center;
    }

    .cta-card p {
      margin: 0 auto;
      max-width: 760px;
      color: rgba(255,255,255,.82);
      line-height: 1.9;
    }

    .cta-actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    @media (max-width: 1100px) {
      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .content-grid {
        grid-template-columns: 1fr;
      }

      .agent-card {
        position: relative;
        top: auto;
      }
    }

    @media (max-width: 700px) {
      .container {
        width: calc(100% - 24px);
      }

      .listing-hero {
        min-height: 650px;
      }

      .hero-inner {
        padding: 150px 0 100px;
      }

      .hero-title {
        letter-spacing: -1.7px;
      }

      .hero-price,
      .hero-btn {
        width: 100%;
      }

      .summary-grid,
      .details-grid {
        grid-template-columns: 1fr;
      }

      .summary-card,
      .card,
      .agent-card {
        border-radius: 26px;
      }

  const parts = window.location.pathname.split("/").filter(Boolean);
  if (parts[0] !== "listing" || !parts[1]) return null;

  const fullSlug = decodeURIComponent(parts[1]);
  const split = fullSlug.split("-");

  return {
    fullSlug,
    id: split[split.length - 1],
    slug: fullSlug
  };
}

    if (!price) return "Price on request";

    const num = Number(String(price).replace(/[^\d.]/g, ""));

      if (listingType === "rent") return `RM ${num.toLocaleString()}/month`;
      return `RM ${num.toLocaleString()}`;
    }

    return String(price);
  }

      .replace(/'/g, "&#39;");

    if (t.includes("terrace")) return "/categories/terrace-house";
    if (t.includes("semi")) return "/categories/semi-detached-house";
    if (t.includes("bungalow")) return "/categories/bungalow";
    if (t.includes("townhouse")) return "/categories/townhouse";
    if (t.includes("soho")) return "/categories/soho";
    return "/categories/all-listings";
  }

  async function hydrateListingSeoContent(listingDocId, data) {
    const mount = document.getElementById("seo-supplement-mount");
    if (!mount) return;

    const matchedSlug = matchAreaSlugForListing(data);
    const areaGuide = matchedSlug ? AREA_GUIDES[matchedSlug] : null;

    let related = [];
    try {
      const relSnap = await getDocs(query(collection(db, "listings"), limit(80)));
      const wantType = String(data.type || "").toLowerCase();
      const wantLoc = String(data.location || data.city || data.area || "")
        .toLowerCase()
        .replace(/\s+/g, " ")
        .trim()
        .slice(0, 8);

      relSnap.forEach((doc) => {
        if (doc.id === listingDocId || related.length >= 8) return;
        const d = doc.data();
        const sameType = wantType.length > 2 && String(d.type || "").toLowerCase() === wantType;
        const hay = [d.location, d.city, d.area, d.address].filter(Boolean).join(" ").toLowerCase();
        const nearLoc = wantLoc.length > 3 && hay.includes(wantLoc);
        if (sameType || nearLoc) related.push({ id: doc.id, ...d });
      });

      if (related.length < 4) {
        relSnap.forEach((doc) => {
          if (doc.id === listingDocId || related.length >= 8) return;
          if (related.some((r) => r.id === doc.id)) return;
          related.push({ id: doc.id, ...doc.data() });
        });
      }
    } catch (e) {
      console.warn("Related listings for SEO supplement:", e);
    }

    const cards = buildRelatedListingCards(related.slice(0, 8), SITE_ORIGIN);
    mount.innerHTML = buildListingSeoSupplementHtml(data, areaGuide, cards);
    injectJsonLd("listing-faq-schema", buildListingFaqJsonLd());
  }
